<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Educational Gist Creator via Gemini</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
<div class="container">
    <h2 id="title">Code Analyzer & Educational Gist Creator</h2>
    <p id="description">This app automatically finds a source file in your repository, analyzes it with AI, and creates a professional educational breakdown in English.</p>

    <label for="language_select" id="language_label">Interface language</label>
    <select id="language_select"></select>

    <label for="gh_token" id="gh_token_label">GitHub Personal Access Token (scopes: 'gist' and 'repo'):</label>
    <input type="password" id="gh_token" placeholder="ghp_...">

    <label for="gemini_token" id="gemini_token_label">Gemini API Key:</label>
    <input type="password" id="gemini_token" placeholder="AIza...">

    <label for="repo_path" id="repo_path_label">GitHub repository (format: owner/repo):</label>
    <input type="text" id="repo_path" placeholder="example: OstinUA/ads.txt-app-ads.txt-sellers.json-Lines-Checker">

    <button id="run_btn">Generate Code Review Gist</button>

    <div id="log" data-state="ready">System ready. Fill in the data and click the button.</div>
</div>

<script src="static/js/i18n/en.js"></script>
<script src="static/js/i18n/zh.js"></script>
<script src="static/js/i18n/es.js"></script>
<script src="static/js/i18n/fr.js"></script>
<script src="static/js/i18n/pt.js"></script>
<script src="static/js/i18n/ru.js"></script>
<script src="static/js/i18n/ja.js"></script>
<script src="static/js/i18n/de.js"></script>
<script src="static/js/i18n/uk.js"></script>
<script src="static/js/i18n/pl.js"></script>
<script src="static/js/i18n/nl.js"></script>
<script src="static/js/i18n/kk.js"></script>
<script src="static/js/i18n/sv.js"></script>
<script src="static/js/i18n/cs.js"></script>
<script src="static/js/i18n/index.js"></script>
<script src="static/js/app.js"></script>
</body>
</html>
